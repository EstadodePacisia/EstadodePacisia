<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | Estado de Pacisia</title>
    <link rel="icon" type="image/png" href="Escudo del Estado de Pacisia.png">
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #444444;
            --border: #eaeaea;
            --accent: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .container { max-width: 600px; }

        h1 { font-size: 5rem; font-weight: 800; letter-spacing: -0.05em; margin-bottom: 10px; }
        
        h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.05em; }

        p { color: var(--text-sub); margin-bottom: 40px; }

        a { 
            display: inline-block;
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        a:hover { opacity: 0.8; }
        
        footer { position: absolute; bottom: 40px; font-size: 0.7rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Página no encontrada</h2>
        <p>Lo sentimos, el recurso que intenta consultar no existe dentro de la red oficial del Estado de Pacisia.</p>
        <a href="index.html">Volver al portal principal</a>
    </div>

    <footer>
        Gobierno del Estado de Pacisia &copy; 2026
    </footer>

</body>
</html>
