<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Estado de Pacisia</title>
    <link rel="icon" type="image/png" href="Escudo del Estado de Pacisia.png">
    <!-- Tipografías Modernas y Geométricas -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --blue-dark: #003da5;    
            --blue-light: #7a9ad1;   
            --white-pure: #ffffff;   
            --bg-soft: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #475569;
            --border: #e2e8f0;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg-soft); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 80px;
            width: 100%;
            position: fixed;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
            transition: var(--transition);
        }

        .nav-brand { display: flex; align-items: center; gap: 20px; text-decoration: none; color: var(--text-main); }
        
        /* Contenedor oficial para visualización permanente de los símbolos */
        .nav-symbols { display: flex; align-items: center; gap: 12px; }
        .nav-symbols img { height: 40px; width: auto; object-fit: contain; }
        
        .nav-brand div { border-left: 2px solid var(--border); padding-left: 15px; }
        .nav-brand h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-main); }

        /* --- CONTENEDOR 404 CON PAISAJE --- */
        .error-container {
            position: relative;
            margin-top: 80px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 8%;
            background: linear-gradient(rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.4)), 
                        url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80') no-repeat center center;
            background-size: cover;
            text-align: center;
        }

        .error-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .error-code {
            font-family: 'Satoshi', sans-serif;
            font-size: 6rem;
            font-weight: 900;
            color: var(--blue-dark);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -0.04em;
        }

        .error-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .error-message {
            font-size: 1.05rem;
            color: var(--text-sub);
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .return-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--blue-dark);
            color: var(--white-pure);
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(0,39,165,0.25);
            transition: var(--transition);
        }

        .return-btn:hover {
            background: #00287a;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,39,165,0.35);
        }

        footer { 
            background: #0b1329; 
            color: var(--white-pure); 
            padding: 30px 10%; 
            text-align: center; 
        }
        footer p { 
            font-size: 0.85rem; 
            color: #64748b; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .error-content { padding: 40px 25px; }
            .error-code { font-size: 4.5rem; }
            .error-title { font-size: 1.4rem; }
            header { padding: 0 5%; }
            /* Se mantiene la visualización de bandera y escudo intacta en móviles */
        }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="nav-brand">
            <div class="nav-symbols">
                <img src="Escudo del Estado de Pacisia.png" alt="Escudo Oficial">
                <img src="Bandera del Estado de Pacisia.png" alt="Bandera Oficial">
            </div>
            <div><h1>Estado de Pacisia</h1></div>
        </div>
    </header>

    <!-- CONTENEDOR CENTRAL DE ERROR -->
    <div class="error-container">
        <div class="error-content">
            <div class="error-code">404</div>
            <h2 class="error-title">Dirección no encontrada</h2>
            <p class="error-message">
                El recurso institucional al que intenta acceder no se encuentra disponible, ha sido trasladado o no existe dentro del servidor oficial del Estado.
            </p>
            <a href="index.html" class="return-btn">
                <i class="fas fa-arrow-left"></i> Retornar al Portal Oficial
            </a>
        </div>
    </div>

    <footer>
        <p>Estado de Pacisia &copy; 2026 • Canal de Comunicación Institucional</p>
    </footer>

</body>
</html>
