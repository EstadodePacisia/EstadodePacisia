<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Estado de Maralba</title>
    <link rel="icon" type="image/png" href="Escudo del Estado de Maralba.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #444444;
            --border: #eaeaea;
            --accent: #000000;
            --hover: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVEGACIÓN (Simplificada para error) --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            height: 80px;
            width: 100%;
            position: fixed;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-main); }
        .nav-brand img { height: 50px; width: auto; }
        .nav-brand div { border-left: 1px solid var(--border); padding-left: 12px; }
        .nav-brand h1 { font-size: 0.9rem; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }

        /* --- CONTENIDO PRINCIPAL --- */
        main { 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 140px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .error-container {
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .error-code {
            font-size: 7rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 10px;
            color: var(--accent);
        }

        h2 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            letter-spacing: -0.03em; 
            margin-bottom: 20px; 
            text-transform: uppercase;
        }

        p { 
            color: var(--text-sub); 
            font-size: 1.1rem; 
            max-width: 600px; 
            margin: 0 auto 40px; 
        }

        .btn-home {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            padding: 15px 35px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 4px;
            transition: 0.2s;
            border: 1px solid var(--accent);
        }

        .btn-home:hover {
            background: var(--bg);
            color: var(--accent);
        }

        /* --- FOOTER --- */
        footer { padding: 60px 10% 40px; border-top: 1px solid var(--border); text-align: center; background: #fafafa; width: 100%; }
        footer img { height: 50px; margin-bottom: 20px; }
        footer p { font-size: 0.8rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.15em; }

        @media (max-width: 768px) {
            header { padding: 0 5%; }
            .error-code { font-size: 5rem; }
            h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="nav-brand">
            <img src="Escudo del Estado de Maralba.png" alt="Escudo">
            <div><h1>Estado de Maralba</h1></div>
        </a>
    </header>

    <main>
        <div class="error-container">
            <div class="error-code">404</div>
            <h2>Página no encontrada</h2>
            <p>El recurso o documento oficial que intenta consultar no se encuentra disponible en el servidor o ha sido reubicado dentro del Portal Oficial del Estado.</p>
            <a href="index.html" class="btn-home"><i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Volver al Inicio</a>
        </div>
    </main>

    <footer>
        <img src="Escudo del Estado de Maralba.png" alt="Logo de Maralba">
        <p>Gobierno del Estado de Maralba &copy; 2026</p>
    </footer>

</body>
</html>
